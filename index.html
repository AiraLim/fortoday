<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘도 화이팅! 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Pen+Script&family=Do+Hyeon&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c1: #FF6B6B;
      --c2: #FFD93D;
      --c3: #6BCB77;
      --c4: #4D96FF;
      --c5: #FF9FF3;
      --c6: #FFA552;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Jua', sans-serif;
      background: #FFF8F0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Animated background blobs */
    .blob-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.45;
      animation: blobMove 8s ease-in-out infinite alternate;
    }
    .blob:nth-child(1) { width: 420px; height: 420px; background: var(--c1); top: -80px; left: -80px; animation-delay: 0s; }
    .blob:nth-child(2) { width: 360px; height: 360px; background: var(--c2); top: -60px; right: -60px; animation-delay: 1.5s; }
    .blob:nth-child(3) { width: 300px; height: 300px; background: var(--c3); bottom: -60px; left: 10%; animation-delay: 3s; }
    .blob:nth-child(4) { width: 380px; height: 380px; background: var(--c4); bottom: -80px; right: -60px; animation-delay: 2s; }
    .blob:nth-child(5) { width: 260px; height: 260px; background: var(--c5); top: 40%; left: 40%; animation-delay: 1s; }

    @keyframes blobMove {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 20px) scale(1.08); }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(24px);
      border-radius: 36px;
      padding: 52px 60px 44px;
      text-align: center;
      box-shadow:
        0 8px 40px rgba(0,0,0,0.10),
        0 0 0 3px rgba(255,255,255,0.6) inset;
      max-width: 560px;
      width: 90vw;
      animation: cardPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes cardPop {
      from { opacity: 0; transform: scale(0.7) translateY(40px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Sun emoji top */
    .sun {
      font-size: 3.6rem;
      display: block;
      margin-bottom: 12px;
      animation: sunSpin 6s linear infinite;
      transform-origin: center;
    }
    @keyframes sunSpin {
      0%   { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.15); }
      100% { transform: rotate(360deg) scale(1); }
    }

    /* Main headline */
    .headline {
      font-family: 'Do Hyeon', sans-serif;
      font-size: clamp(3rem, 10vw, 5.2rem);
      line-height: 1.1;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--c1) 0%, var(--c6) 30%, var(--c2) 55%, var(--c3) 75%, var(--c4) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: textShimmer 4s ease-in-out infinite alternate;
      background-size: 200%;
    }
    @keyframes textShimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .sub {
      font-family: 'Nanum Pen Script', cursive;
      font-size: clamp(1.3rem, 4vw, 1.9rem);
      color: #555;
      margin-top: 14px;
      animation: fadeSlide 1s 0.5s ease both;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Color bar */
    .rainbow-bar {
      height: 6px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--c1), var(--c6), var(--c2), var(--c3), var(--c4), var(--c5));
      background-size: 300%;
      margin: 24px auto 20px;
      width: 70%;
      animation: barSlide 3s linear infinite;
    }
    @keyframes barSlide {
      0%   { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    /* Message pills */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 4px;
      animation: fadeSlide 1s 0.9s ease both;
      opacity: 0;
      animation-fill-mode: both;
    }
    .pill {
      padding: 7px 18px;
      border-radius: 99px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
      animation: pillBounce 2.5s ease-in-out infinite;
    }
    .pill:nth-child(1) { background: var(--c1); animation-delay: 0s; }
    .pill:nth-child(2) { background: var(--c6); animation-delay: 0.3s; }
    .pill:nth-child(3) { background: var(--c2); color: #555; animation-delay: 0.6s; }
    .pill:nth-child(4) { background: var(--c3); animation-delay: 0.9s; }
    .pill:nth-child(5) { background: var(--c4); animation-delay: 1.2s; }
    .pill:nth-child(6) { background: var(--c5); color: #555; animation-delay: 1.5s; }

    @keyframes pillBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Confetti */
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      top: -20px;
      border-radius: 2px;
      animation: confettiFall linear infinite;
      opacity: 0.85;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Stars floating */
    .stars-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }
    .star {
      position: absolute;
      font-size: 1.4rem;
      animation: starFloat ease-in-out infinite alternate;
      opacity: 0.75;
    }
    @keyframes starFloat {
      from { transform: translateY(0) rotate(-10deg) scale(0.9); }
      to   { transform: translateY(-18px) rotate(10deg) scale(1.1); }
    }

    /* Bottom emoji row */
    .emoji-row {
      margin-top: 22px;
      font-size: 1.8rem;
      letter-spacing: 4px;
      animation: fadeSlide 1s 1.2s ease both;
      opacity: 0;
      animation-fill-mode: both;
    }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="blob-wrap">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
  </div>

  <!-- Confetti -->
  <div class="confetti-wrap" id="confettiWrap"></div>

  <!-- Floating stars -->
  <div class="stars-wrap" id="starsWrap"></div>

  <!-- Main card -->
  <div class="card">
    <span class="sun">☀️</span>
    <div class="headline">오늘도 화이팅!</div>
    <div class="sub">우리 팀이 있기에 오늘도 빛납니다 ✨</div>
    <div class="rainbow-bar"></div>
    <div class="pills">
      <span class="pill">💪 할 수 있어</span>
      <span class="pill">🌈 최고야</span>
      <span class="pill">⭐ 잘하고 있어</span>
      <span class="pill">🎯 파이팅</span>
      <span class="pill">🚀 함께라면 OK</span>
      <span class="pill">🌸 오늘도 수고</span>
    </div>
    <div class="emoji-row">🌻 🍀 🎊 🌟 🎈</div>
  </div>

  <script>
    // --- Confetti ---
    const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF9FF3','#FFA552','#fff'];
    const shapes = ['square','circle','rect'];
    const wrap = document.getElementById('confettiWrap');

    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const color = colors[Math.floor(Math.random() * colors.length)];
      const shape = shapes[Math.floor(Math.random() * shapes.length)];
      const size = Math.random() * 10 + 6;
      el.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${shape === 'rect' ? size * 0.5 : size}px;
        height: ${size}px;
        background: ${color};
        border-radius: ${shape === 'circle' ? '50%' : shape === 'rect' ? '2px' : '2px'};
        animation-duration: ${Math.random() * 4 + 4}s;
        animation-delay: ${Math.random() * 6}s;
      `;
      wrap.appendChild(el);
    }

    // --- Floating stars ---
    const starsEmoji = ['⭐','🌟','✨','💫','🌸','🌼','🎀','🎁','🍀','🌈','🎵','💖'];
    const starsWrap = document.getElementById('starsWrap');

    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div');
      el.className = 'star';
      el.textContent = starsEmoji[Math.floor(Math.random() * starsEmoji.length)];
      el.style.cssText = `
        left: ${Math.random() * 95}%;
        top: ${Math.random() * 90}%;
        font-size: ${Math.random() * 1.2 + 0.9}rem;
        animation-duration: ${Math.random() * 2 + 2}s;
        animation-delay: ${Math.random() * 3}s;
      `;
      starsWrap.appendChild(el);
    }
  </script>
</body>
</html>
